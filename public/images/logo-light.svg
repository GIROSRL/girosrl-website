<svg xmlns="http://www.w3.org/2000/svg" width="600" height="200" viewBox="0 0 600 200">

  <!-- Sfondo light -->
  <rect width="600" height="200" fill="#f4f7fc" rx="0"/>

  <!-- Cerchio orbitale (centro 100, 100) -->
  <g transform="translate(100, 100)">
    <circle cx="0" cy="0" r="50" fill="none" stroke="#b8cfe8" stroke-width="0.8" stroke-dasharray="3.5 3"/>
    <circle cx="0" cy="0" r="34" fill="none" stroke="#3a8fe8" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="20" fill="none" stroke="#a0bcd8" stroke-width="0.8"/>
    <circle cx="0" cy="0" r="11" fill="#1a5faa"/>
    <circle cx="35" cy="-35" r="5.5" fill="#3a8fe8"/>
    <line x1="8" y1="-8" x2="30" y2="-30" stroke="#3a8fe8" stroke-width="0.8" stroke-dasharray="2 2"/>
    <path d="M -50 0 A 50 50 0 0 1 0 -50" fill="none" stroke="#1a5faa" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Wordmark GIRO -->
  <text
    x="178" y="92"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="52"
    font-weight="200"
    letter-spacing="14"
    fill="#0a1628">GIRO</text>

  <!-- SRL -->
  <text
    x="179" y="114"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="13"
    font-weight="300"
    letter-spacing="7"
    fill="#1a5faa">SRL</text>

  <!-- Linea orizzontale -->
  <line x1="178" y1="125" x2="490" y2="125" stroke="#1a5faa" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Claim -->
  <text
    x="178" y="145"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="11"
    font-weight="300"
    letter-spacing="2.5"
    fill="#1a5faa">UN SOLO PARTNER. INFINITE DIREZIONI.</text>

</svg>
