<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" width="1440" height="900">
  <defs>
    <linearGradient id="bg-helme" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f5f5f0"/>
      <stop offset="100%" stop-color="#e8e4db"/>
    </linearGradient>
  </defs>
  <rect width="1440" height="900" fill="url(#bg-helme)"/>
  <!-- Instagram-like mockup -->
  <rect x="80" y="80" width="640" height="740" rx="24" fill="#ffffff" stroke="#d0cfc8" stroke-width="1"/>
  <!-- IG header -->
  <circle cx="130" cy="130" r="22" fill="none" stroke="#e1306c" stroke-width="2"/>
  <circle cx="130" cy="130" r="18" fill="#0d1424"/>
  <text x="166" y="128" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="700" fill="#0d1424">helme.official</text>
  <text x="166" y="146" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#737373">Milano · Originale</text>
  <!-- Post image -->
  <rect x="80" y="170" width="640" height="540" fill="#0d1424"/>
  <text x="400" y="420" text-anchor="middle" font-family="Georgia, serif" font-size="80" font-weight="900" font-style="italic" fill="#ffffff">HELME</text>
  <text x="400" y="470" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#9a9a9a" letter-spacing="4">MOOD.STREET.STYLE</text>
  <!-- IG actions -->
  <text x="110" y="750" font-size="22" fill="#0d1424">♡</text>
  <text x="145" y="750" font-size="20" fill="#0d1424">💬</text>
  <text x="180" y="750" font-size="20" fill="#0d1424">➤</text>
  <text x="110" y="780" font-family="Helvetica, Arial, sans-serif" font-size="12" font-weight="600" fill="#0d1424">1.248 Mi piace</text>
  <text x="110" y="802" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#0d1424"><tspan font-weight="700">helme.official</tspan> Nuova collezione autunno</text>

  <!-- Right metrics -->
  <text x="810" y="140" font-family="Helvetica, Arial, sans-serif" font-size="13" font-weight="500" letter-spacing="3" fill="#8a7a6a">SOCIAL MANAGEMENT</text>
  <text x="810" y="240" font-family="Georgia, serif" font-size="96" font-weight="900" fill="#0d1424">Helme</text>
  <text x="812" y="300" font-family="Helvetica, Arial, sans-serif" font-size="18" fill="#5a5550" letter-spacing="1">Gestione social + contenuti</text>
  <line x1="810" y1="340" x2="1050" y2="340" stroke="#d0cfc8" stroke-width="1"/>

  <!-- KPI -->
  <text x="810" y="430" font-family="Helvetica, Arial, sans-serif" font-size="11" letter-spacing="2" fill="#8a7a6a">ENGAGEMENT</text>
  <text x="810" y="485" font-family="Helvetica, Arial, sans-serif" font-size="48" font-weight="900" fill="#0d1424">+142%</text>
  <text x="810" y="510" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#5a5550">vs trimestre precedente</text>

  <text x="1050" y="430" font-family="Helvetica, Arial, sans-serif" font-size="11" letter-spacing="2" fill="#8a7a6a">POST / MESE</text>
  <text x="1050" y="485" font-family="Helvetica, Arial, sans-serif" font-size="48" font-weight="900" fill="#0d1424">24</text>
  <text x="1050" y="510" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#5a5550">tra feed, reel, stories</text>

  <text x="810" y="620" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#5a5550" letter-spacing="1">· Content plan mensile</text>
  <text x="810" y="645" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#5a5550" letter-spacing="1">· Produzione foto e video</text>
  <text x="810" y="670" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#5a5550" letter-spacing="1">· Community management</text>
  <text x="810" y="695" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#5a5550" letter-spacing="1">· Report engagement</text>

  <text x="80" y="860" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#8a7a6a" letter-spacing="3">HELME — SOCIAL MANAGEMENT GIRO</text>
</svg>
