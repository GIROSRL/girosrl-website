<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 3600" width="1440" height="3600">
  <defs>
    <linearGradient id="sl-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a0d08"/>
      <stop offset="100%" stop-color="#0a0504"/>
    </linearGradient>
    <linearGradient id="sl-gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#d4a843"/>
      <stop offset="100%" stop-color="#f0c860"/>
    </linearGradient>
  </defs>

  <!-- Nav -->
  <rect width="1440" height="72" fill="#120a06"/>
  <text x="720" y="44" font-family="Georgia,serif" font-size="24" font-weight="700" fill="#d4a843" letter-spacing="8" text-anchor="middle">SICILERY</text>
  <text x="400" y="44" font-family="Arial,sans-serif" font-size="13" fill="#8a6040">Shop</text>
  <text x="520" y="44" font-family="Arial,sans-serif" font-size="13" fill="#8a6040">La nostra storia</text>
  <text x="900" y="44" font-family="Arial,sans-serif" font-size="13" fill="#8a6040">Prodotti</text>
  <text x="1020" y="44" font-family="Arial,sans-serif" font-size="13" fill="#8a6040">Contatti</text>
  <line x1="0" y1="72" x2="1440" y2="72" stroke="#2a1a10" stroke-width="1"/>

  <!-- Hero -->
  <rect y="72" width="1440" height="720" fill="url(#sl-bg)"/>
  <text x="720" y="280" font-family="Georgia,serif" font-size="18" fill="#d4a843" text-anchor="middle" letter-spacing="8">I SAPORI AUTENTICI DELLA SICILIA</text>
  <text x="720" y="420" font-family="Georgia,serif" font-size="110" font-weight="700" fill="#fff" text-anchor="middle" font-style="italic">Sicilery</text>
  <text x="720" y="520" font-family="Arial,sans-serif" font-size="20" fill="#a07850" text-anchor="middle">Prodotti tipici siciliani selezionati con cura.</text>
  <rect x="560" y="580" width="320" height="52" rx="2" fill="none" stroke="#d4a843" stroke-width="1.5"/>
  <text x="720" y="612" font-family="Arial,sans-serif" font-size="15" fill="#d4a843" text-anchor="middle" letter-spacing="2">SCOPRI I PRODOTTI</text>

  <!-- Products section -->
  <rect y="792" width="1440" height="800" fill="#100806"/>
  <text x="720" y="880" font-family="Arial,sans-serif" font-size="13" fill="#d4a843" text-anchor="middle" letter-spacing="6">I NOSTRI PRODOTTI</text>
  <text x="720" y="940" font-family="Georgia,serif" font-size="48" font-weight="700" fill="#fff" text-anchor="middle">Eccellenze siciliane</text>
  <!-- Product circles -->
  <circle cx="240" cy="1200" r="180" fill="#2a1a0a"/>
  <circle cx="240" cy="1200" r="160" fill="none" stroke="#d4a843" stroke-width="1" opacity="0.4"/>
  <text x="240" y="1170" font-family="Georgia,serif" font-size="20" fill="#d4a843" text-anchor="middle">Olio EVO</text>
  <text x="240" y="1210" font-family="Arial,sans-serif" font-size="14" fill="#a07850" text-anchor="middle">Primo fiore</text>
  <text x="240" y="1260" font-family="Arial,sans-serif" font-size="16" fill="#f0c860" text-anchor="middle">€ 18,90</text>
  <circle cx="720" cy="1200" r="180" fill="#2a1a0a"/>
  <circle cx="720" cy="1200" r="160" fill="none" stroke="#d4a843" stroke-width="1" opacity="0.4"/>
  <text x="720" y="1170" font-family="Georgia,serif" font-size="20" fill="#d4a843" text-anchor="middle">Pistacchio</text>
  <text x="720" y="1210" font-family="Arial,sans-serif" font-size="14" fill="#a07850" text-anchor="middle">Bronte DOP</text>
  <text x="720" y="1260" font-family="Arial,sans-serif" font-size="16" fill="#f0c860" text-anchor="middle">€ 24,50</text>
  <circle cx="1200" cy="1200" r="180" fill="#2a1a0a"/>
  <circle cx="1200" cy="1200" r="160" fill="none" stroke="#d4a843" stroke-width="1" opacity="0.4"/>
  <text x="1200" y="1170" font-family="Georgia,serif" font-size="20" fill="#d4a843" text-anchor="middle">Miele</text>
  <text x="1200" y="1210" font-family="Arial,sans-serif" font-size="14" fill="#a07850" text-anchor="middle">di zagara</text>
  <text x="1200" y="1260" font-family="Arial,sans-serif" font-size="16" fill="#f0c860" text-anchor="middle">€ 14,90</text>

  <!-- About section -->
  <rect y="1592" width="1440" height="580" fill="#0d0806"/>
  <line x1="0" y1="1592" x2="1440" y2="1592" stroke="#2a1a10" stroke-width="1"/>
  <text x="720" y="1680" font-family="Arial,sans-serif" font-size="13" fill="#d4a843" text-anchor="middle" letter-spacing="6">LA NOSTRA STORIA</text>
  <text x="720" y="1750" font-family="Georgia,serif" font-size="48" font-weight="700" fill="#fff" text-anchor="middle">Radici siciliane</text>
  <rect x="48" y="1820" width="620" height="280" rx="4" fill="#1a0d08"/>
  <text x="120" y="1900" font-family="Arial,sans-serif" font-size="18" fill="#c8a070">Selezioniamo i migliori produttori</text>
  <text x="120" y="1930" font-family="Arial,sans-serif" font-size="18" fill="#c8a070">siciliani dal 2018.</text>
  <text x="120" y="1980" font-family="Arial,sans-serif" font-size="15" fill="#7a5030">Qualità, tradizione e rispetto</text>
  <text x="120" y="2008" font-family="Arial,sans-serif" font-size="15" fill="#7a5030">per la nostra terra.</text>
  <rect x="772" y="1820" width="620" height="280" rx="4" fill="#2a1a0a"/>
  <text x="1082" y="1978" font-family="Georgia,serif" font-size="24" fill="#d4a843" text-anchor="middle" opacity="0.8">100% Sicilia</text>

  <!-- Gold divider -->
  <rect y="2172" width="1440" height="4" fill="url(#sl-gold)" opacity="0.3"/>

  <!-- Packaging section -->
  <rect y="2176" width="1440" height="560" fill="#100806"/>
  <text x="720" y="2264" font-family="Arial,sans-serif" font-size="13" fill="#d4a843" text-anchor="middle" letter-spacing="6">PACKAGING</text>
  <text x="720" y="2330" font-family="Georgia,serif" font-size="48" font-weight="700" fill="#fff" text-anchor="middle">Un dono speciale</text>
  <rect x="200" y="2400" width="1040" height="280" rx="8" fill="#1a0d08"/>
  <text x="720" y="2560" font-family="Georgia,serif" font-size="28" fill="#d4a843" text-anchor="middle">Confezioni regalo per ogni occasione</text>

  <!-- Testimonials -->
  <rect y="2736" width="1440" height="440" fill="#0d0806"/>
  <text x="720" y="2820" font-family="Arial,sans-serif" font-size="13" fill="#d4a843" text-anchor="middle" letter-spacing="6">RECENSIONI</text>
  <text x="720" y="2880" font-family="Georgia,serif" font-size="40" font-weight="700" fill="#fff" text-anchor="middle">I clienti ci amano</text>
  <rect x="80" y="2930" width="580" height="180" rx="4" fill="#1a0d08" stroke="#2a1a10" stroke-width="1"/>
  <text x="160" y="2995" font-family="Georgia,serif" font-size="17" fill="#c8a070">"Prodotti eccezionali, packaging</text>
  <text x="160" y="3025" font-family="Georgia,serif" font-size="17" fill="#c8a070">curatissimo. Li regalo a tutti."</text>
  <text x="160" y="3075" font-family="Arial,sans-serif" font-size="13" fill="#d4a843">— Anna M.</text>
  <rect x="780" y="2930" width="580" height="180" rx="4" fill="#1a0d08" stroke="#2a1a10" stroke-width="1"/>
  <text x="860" y="2995" font-family="Georgia,serif" font-size="17" fill="#c8a070">"Il pistacchio di Bronte è</text>
  <text x="860" y="3025" font-family="Georgia,serif" font-size="17" fill="#c8a070">semplicemente il migliore."</text>
  <text x="860" y="3075" font-family="Arial,sans-serif" font-size="13" fill="#d4a843">— Luca S.</text>

  <!-- Footer CTA -->
  <rect y="3176" width="1440" height="424" fill="url(#sl-bg)"/>
  <text x="720" y="3320" font-family="Georgia,serif" font-size="60" font-weight="700" fill="#fff" text-anchor="middle" font-style="italic">Porta la Sicilia</text>
  <text x="720" y="3400" font-family="Georgia,serif" font-size="60" font-weight="700" fill="#d4a843" text-anchor="middle" font-style="italic">a tavola.</text>
  <rect x="560" y="3450" width="320" height="52" rx="2" fill="#d4a843"/>
  <text x="720" y="3482" font-family="Arial,sans-serif" font-size="15" fill="#1a0d08" text-anchor="middle" letter-spacing="2">SHOP NOW</text>
  <text x="720" y="3560" font-family="Arial,sans-serif" font-size="13" fill="#4a3020" text-anchor="middle">sicilery.com</text>
</svg>
