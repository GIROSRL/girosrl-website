<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" width="1440" height="900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f7f2e8"/>
      <stop offset="100%" stop-color="#ede0c8"/>
    </linearGradient>
  </defs>
  <rect width="1440" height="900" fill="url(#bg)"/>
  <!-- Top nav -->
  <text x="70" y="70" font-family="Georgia, serif" font-size="22" font-weight="700" fill="#3a2817" letter-spacing="2">Sicilia Classica</text>
  <g font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#6a4e34" letter-spacing="1">
    <text x="900" y="70">Prodotti</text>
    <text x="1000" y="70">Chi siamo</text>
    <text x="1110" y="70">Blog</text>
    <text x="1180" y="70">Contatti</text>
  </g>
  <rect x="1260" y="48" width="140" height="36" rx="18" fill="#8b3c2a"/>
  <text x="1330" y="72" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#fff" letter-spacing="2">SHOP ONLINE</text>

  <!-- Hero -->
  <text x="70" y="320" font-family="Georgia, serif" font-size="88" font-weight="700" fill="#3a2817">L'eccellenza</text>
  <text x="70" y="410" font-family="Georgia, serif" font-size="88" font-weight="700" font-style="italic" fill="#8b3c2a">siciliana,</text>
  <text x="70" y="500" font-family="Georgia, serif" font-size="88" font-weight="700" fill="#3a2817">a casa tua.</text>
  <text x="72" y="550" font-family="Helvetica, Arial, sans-serif" font-size="16" fill="#6a4e34">Vini, prodotti tipici e tradizioni dall'isola, selezionati per te.</text>
  <rect x="70" y="590" width="180" height="48" rx="24" fill="#8b3c2a"/>
  <text x="160" y="620" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#fff" letter-spacing="2">SCOPRI</text>

  <!-- Product grid preview -->
  <g transform="translate(780, 260)">
    <rect x="0" y="0" width="180" height="240" rx="8" fill="#fff" stroke="#d4c09a" stroke-width="1"/>
    <circle cx="90" cy="90" r="60" fill="#8b3c2a" opacity="0.15"/>
    <rect x="20" y="170" width="100" height="10" fill="#3a2817"/>
    <rect x="20" y="190" width="60" height="8" fill="#8b3c2a"/>

    <rect x="200" y="0" width="180" height="240" rx="8" fill="#fff" stroke="#d4c09a" stroke-width="1"/>
    <circle cx="290" cy="90" r="60" fill="#6a4e34" opacity="0.2"/>
    <rect x="220" y="170" width="110" height="10" fill="#3a2817"/>
    <rect x="220" y="190" width="70" height="8" fill="#8b3c2a"/>

    <rect x="400" y="0" width="180" height="240" rx="8" fill="#fff" stroke="#d4c09a" stroke-width="1"/>
    <circle cx="490" cy="90" r="60" fill="#3a2817" opacity="0.15"/>
    <rect x="420" y="170" width="90" height="10" fill="#3a2817"/>
    <rect x="420" y="190" width="55" height="8" fill="#8b3c2a"/>
  </g>
  <!-- Footer tag -->
  <text x="70" y="870" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#8b7355" letter-spacing="3">SICILIACLASSICA.IT — E-COMMERCE ARTIGIANALE</text>
</svg>
