  <text x="48" y="280" font-family="Arial,sans-serif" font-size="96" font-weight="900" fill="#fff">Unconventional</text>
  <text x="48" y="400" font-family="Arial,sans-serif" font-size="96" font-weight="900" fill="url(#su-accent)">stories.</text>
  <text x="48" y="500" font-family="Arial,sans-serif" font-size="20" fill="#aaa">Brand identity &amp; creative direction for brands</text>
  <text x="48" y="530" font-family="Arial,sans-serif" font-size="20" fill="#aaa">that refuse to blend in.</text>
  <rect x="48" y="600" width="180" height="52" rx="2" fill="none" stroke="#fff" stroke-width="1.5"/>
