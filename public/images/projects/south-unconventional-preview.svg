  <text x="900" y="44" font-family="Arial,sans-serif" font-size="13" fill="#888">Work</text>
  <text x="1000" y="44" font-family="Arial,sans-serif" font-size="13" fill="#888">Studio</text>
  <text x="1100" y="44" font-family="Arial,sans-serif" font-size="13" fill="#888">Contact</text>
  <line x1="0" y1="72" x2="1440" y2="72" stroke="#222" stroke-width="1"/>

