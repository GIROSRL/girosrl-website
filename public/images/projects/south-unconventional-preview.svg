<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 3600" width="1440" height="3600">
  <defs>
    <linearGradient id="su-hero" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a12"/>
      <stop offset="100%" stop-color="#141018"/>
    </linearGradient>
    <linearGradient id="su-accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c8a0f0"/>
      <stop offset="100%" stop-color="#80c8f0"/>
