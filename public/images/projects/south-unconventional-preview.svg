  <line x1="0" y1="2992" x2="1440" y2="2992" stroke="#222" stroke-width="1"/>
  <text x="720" y="3060" font-family="Arial,sans-serif" font-size="13" fill="#555" text-anchor="middle" letter-spacing="4">TRUSTED BY</text>
  <text x="200" y="3150" font-family="Arial,sans-serif" font-size="18" font-weight="700" fill="#444" text-anchor="middle">Brand A</text>
  <text x="500" y="3150" font-family="Arial,sans-serif" font-size="18" font-weight="700" fill="#444" text-anchor="middle">Brand B</text>
  <text x="800" y="3150" font-family="Arial,sans-serif" font-size="18" font-weight="700" fill="#444" text-anchor="middle">Brand C</text>
  <text x="1100" y="3150" font-family="Arial,sans-serif" font-size="18" font-weight="700" fill="#444" text-anchor="middle">Brand D</text>
  <text x="1350" y="3150" font-family="Arial,sans-serif" font-size="18" font-weight="700" fill="#444" text-anchor="middle">Brand E</text>

