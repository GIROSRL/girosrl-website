  <text x="240" y="2260" font-family="Arial,sans-serif" font-size="52" font-weight="900" fill="#c8a0f0" text-anchor="middle">40+</text>
  <text x="240" y="2310" font-family="Arial,sans-serif" font-size="14" fill="#888" text-anchor="middle">Brand globali</text>
  <text x="720" y="2260" font-family="Arial,sans-serif" font-size="52" font-weight="900" fill="#80c8f0" text-anchor="middle">8</text>
  <text x="720" y="2310" font-family="Arial,sans-serif" font-size="14" fill="#888" text-anchor="middle">Anni di studio</text>
  <text x="1200" y="2260" font-family="Arial,sans-serif" font-size="52" font-weight="900" fill="#c8a0f0" text-anchor="middle">12</text>
  <text x="1200" y="2310" font-family="Arial,sans-serif" font-size="14" fill="#888" text-anchor="middle">Paesi raggiunti</text>

