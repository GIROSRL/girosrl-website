  <rect y="3232" width="1440" height="368" fill="url(#su-hero)"/>
  <text x="720" y="3360" font-family="Arial,sans-serif" font-size="64" font-weight="900" fill="#fff" text-anchor="middle">Let's create</text>
  <text x="720" y="3440" font-family="Arial,sans-serif" font-size="64" font-weight="900" fill="url(#su-accent)" text-anchor="middle">something great.</text>
  <text x="720" y="3530" font-family="Arial,sans-serif" font-size="14" fill="#555" text-anchor="middle">southunconventional.com</text>
