  <text x="220" y="2640" font-family="Arial,sans-serif" font-size="40" font-weight="900" fill="#c8a0f0" text-anchor="middle">01</text>
  <text x="220" y="2700" font-family="Arial,sans-serif" font-size="18" font-weight="700" fill="#fff" text-anchor="middle">Discover</text>
  <rect x="400" y="2580" width="280" height="340" rx="4" fill="#1a1020"/>
  <text x="540" y="2640" font-family="Arial,sans-serif" font-size="40" font-weight="900" fill="#80c8f0" text-anchor="middle">02</text>
  <text x="540" y="2700" font-family="Arial,sans-serif" font-size="18" font-weight="700" fill="#fff" text-anchor="middle">Design</text>
  <rect x="720" y="2580" width="280" height="340" rx="4" fill="#1a1020"/>
  <text x="860" y="2640" font-family="Arial,sans-serif" font-size="40" font-weight="900" fill="#c8a0f0" text-anchor="middle">03</text>
  <text x="860" y="2700" font-family="Arial,sans-serif" font-size="18" font-weight="700" fill="#fff" text-anchor="middle">Deliver</text>
  <rect x="1040" y="2580" width="320" height="340" rx="4" fill="#1a1020"/>
  <text x="1200" y="2640" font-family="Arial,sans-serif" font-size="40" font-weight="900" fill="#80c8f0" text-anchor="middle">04</text>
  <text x="1200" y="2700" font-family="Arial,sans-serif" font-size="18" font-weight="700" fill="#fff" text-anchor="middle">Evolve</text>

