  <text x="68" y="1320" font-family="Arial,sans-serif" font-size="22" font-weight="700" fill="#fff">Project Alpha</text>
  <text x="68" y="1354" font-family="Arial,sans-serif" font-size="14" fill="#888">Brand · Strategy · Digital</text>
  <rect x="752" y="920" width="640" height="480" rx="4" fill="#1a1420"/>
  <rect x="752" y="920" width="640" height="340" rx="4" fill="#1a2a3a"/>
